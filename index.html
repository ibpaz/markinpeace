<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkinPeace - IBPAZ</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #041d2c; color: white; overflow-x: hidden; }
        .sidebar-dark { background-color: #02111a; }
        .card-round { border-radius: 2.5rem; background-color: #062d44; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #0a3d5c; position: relative; overflow: hidden; }
        .btn-primary { background-color: #1e6091; border-radius: 1rem; transition: 0.2s; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover:not(:disabled) { background-color: #2a86c9; transform: translateY(-1px); }
        .btn-primary:disabled { background-color: #1a3a4d; color: #4a5568; cursor: not-allowed; opacity: 0.7; }
        .input-field { background-color: #0a3d5c; border-radius: 1rem; padding: 0.7rem 1.2rem; width: 100%; outline: none; border: 2px solid transparent; color: #e2e8f0; font-size: 14px; }
        .input-field:focus { border-color: #1e6091; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-radius: 12px; font-weight: 700; font-size: 13px; color: #94a3b8; width: 100%; text-align: left; transition: 0.2s; }
        .nav-item.active { background-color: #22D3EE; color: #02111A; }
        .tag-cap { background-color: #22d3ee; color: #02111a; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .tag-infra { background-color: #1e609133; color: #60a5fa; border: 1px solid #1e6091; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        @keyframes pulse-yellow { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); } 50% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } }
        .btn-obs-float { position: absolute; bottom: 15px; right: 15px; width: 35px; height: 35px; background: #eab308; color: #02111a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; cursor: pointer; animation: pulse-yellow 2s infinite; z-index: 20; border: 2px solid #041d2c; }
        @keyframes pulse-orange { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-fast { animation: pulse-orange 1.2s infinite; }
        .calendar-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 1.5rem; background: #0a3d5c; margin-top: 1rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(100px, 1fr)); gap: 1px; min-width: 700px; }
        .calendar-day { background: #062d44; min-height: 100px; padding: 0.6rem; cursor: pointer; border: 1px solid #ffffff05; position: relative; }
        .calendar-day:hover { background: #0a3d5c; }
        .big-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: 900; color: #30d2e7; opacity: 0.8; }
        .custom-check { width: 22px; height: 22px; accent-color: #1e6091; cursor: pointer; }
        .btn-zap-circle { background-color: #25d366; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .btn-zap-circle:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyDCTa_bpwdcIaHWr15P5rp41HOyaqv2MeA",
            authDomain: "markinpeace-a2f54.firebaseapp.com",
            databaseURL: "https://markinpeace-a2f54-default-rtdb.firebaseio.com",
            projectId: "markinpeace-a2f54",
            storageBucket: "markinpeace-a2f54.firebasestorage.app",
            messagingSenderId: "291627323374",
            appId: "1:291627323374:web:6e7f6291fdcd6aea1288ff"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const fmtDataBR = (s) => s ? s.split('-').reverse().join('/') : "";
        const isEventPast = (date, end) => new Date(`${date}T${end}`) < new Date();
        const isEventStarted = (date, start) => new Date(`${date}T${start}`) < new Date();

        const askZap = (tel, msg, callback) => {
            const send = confirm("Confirmar envio via WhatsApp?");
            if(send) {
                const n = tel.replace(/\D/g, '');
                window.open(`https://api.whatsapp.com/send?phone=55${n}&text=${encodeURIComponent(msg)}`, '_blank');
            }
            if(callback) callback();
        };

        const Modal = ({ title, children, onClose }) => (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
                <div className="bg-[#041d2c] w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden border border-[#1e6091]">
                    <div className="bg-[#1e6091] p-6 text-white flex justify-between items-center text-xs font-black uppercase tracking-widest">
                        <h3>{title}</h3>
                        <button onClick={onClose} className="text-2xl leading-none">&times;</button>
                    </div>
                    <div className="p-8 max-h-[85vh] overflow-y-auto">{children}</div>
                </div>
            </div>
        );

        const Dashboard = ({ user, onLogout }) => {
            const [view, setView] = useState('spaces');
            const [spaces, setSpaces] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [reservations, setReservations] = useState([]);
            const [bookingSpace, setBookingSpace] = useState(null);
            const [blockingSpace, setBlockingSpace] = useState(false);
            const [checkoutRes, setCheckoutRes] = useState(null);
            const [selectedDayEvents, setSelectedDayEvents] = useState(null);
            const [viewObs, setViewObs] = useState(null);
            const [rejectModal, setRejectModal] = useState(null);
            const [editingUser, setEditingUser] = useState(null);
            const [editingSpace, setEditingSpace] = useState(null);
            const [creatingSpace, setCreatingSpace] = useState(false);
            const [calMonth, setCalMonth] = useState(new Date().getMonth());
            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [fDate, setFDate] = useState('');
            const [fSpace, setFSpace] = useState('');
            const [fPerson, setFPerson] = useState('');
            const [hidePast, setHidePast] = useState(true);
            const [hideInstitutional, setHideInstitutional] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [locFilter, setLocFilter] = useState('');
            const [capFilter, setCapFilter] = useState('');

            const isAdmin = user.role === 'admin' || user.email === "adminmestreibpaz@igreja.com";
            const ADMIN_ZAP = "31984078703";

            useEffect(() => {
                db.ref('spaces').on('value', s => setSpaces(s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})) : []));
                db.ref('users').on('value', s => setUsersList(s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})) : []));
                db.ref('reservations').on('value', s => setReservations(s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})) : []));
            }, []);

            // Criamos uma marcação para saber se é a primeira vez que o site abre
            const [isFirstLoad, setIsFirstLoad] = useState(true);

            useEffect(() => {
                // Se for a primeira carga, não faz nada
                if (isFirstLoad) {
                    setIsFirstLoad(false);
                    return;
                }

                // Só executa o scroll automático se a página estiver perto do topo
                // Se o usuário já estiver lá no alto, a gente não "força" a descida
                if (window.scrollY < 100 || (searchTerm || locFilter || capFilter)) {
                    const timer = setTimeout(() => {
                        const elemento = document.getElementById('conteudo-principal');
                        if (elemento) {
                            elemento.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }, 150);
                    return () => clearTimeout(timer);
                }
            }, [view, searchTerm, locFilter, capFilter]);
           
            const checkConflict = (spaceId, date, start, end, excludeId = null) => {
                return reservations.some(r => {
                    if (r.id === excludeId || r.spaceId !== spaceId || r.date !== date || r.status === 'rejeitado') return false;
                    return (start < r.endTime && end > r.startTime);
                });
            };

            const pendingCheckoutBlock = useMemo(() => {
                return reservations.some(r => r.requesterId === user.id && r.status === 'aprovado' && !r.checkoutDone && isEventPast(r.date, r.endTime));
            }, [reservations, user.id]);

            const calendarDays = useMemo(() => {
                const first = new Date(calYear, calMonth, 1).getDay();
                const days = new Date(calYear, calMonth + 1, 0).getDate();
                const arr = Array(first).fill(null);
                for(let i=1; i<=days; i++) arr.push({ day: i, date: `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}` });
                const filteredReservations = reservations.filter(r => 
    hideInstitutional ? r.status !== 'bloqueio' : true
);
                return arr;
            }, [calMonth, calYear]);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <nav className="w-full md:w-72 sidebar-dark p-8 flex flex-col gap-2 shrink-0">
                        <div className="flex flex-col items-center mb-8">
    <img 
        src="logo.png" 
        alt="Logo MarkinPeace" 
        className="w-24 h-auto object-contain opacity-90" 
    />
    <div className="h-[1px] w-full bg-white/5 mt-6"></div>
</div>
                        <button onClick={() => setView('spaces')} className={`nav-item ${view === 'spaces' ? 'active' : ''}`}><span>🏢</span> Espaços</button>
                        <button onClick={() => setView('calendar')} className={`nav-item ${view === 'calendar' ? 'active' : ''}`}><span>📅</span> Calendário</button>
                        <button onClick={() => setView('my-bookings')} className={`nav-item ${view === 'my-bookings' ? 'active' : ''}`}><span>📄</span> Minhas Reservas</button>
                        <button onClick={() => setView('public')} className={`nav-item ${view === 'public' ? 'active' : ''}`}><span>🔍</span> Visão Geral</button>
                        {isAdmin && (
                            <div className="mt-8 flex flex-col gap-2 border-t border-white/10 pt-6">
                                <button onClick={() => setView('approve')} className={`nav-item ${view === 'approve' ? 'active' : ''}`}><span>⌛</span> Pendentes</button>
                                <button onClick={() => setView('users')} className={`nav-item ${view === 'users' ? 'active' : ''}`}><span>👤</span> Usuários</button>
                                <button onClick={() => setView('manage-spaces')} className={`nav-item ${view === 'manage-spaces' ? 'active' : ''}`}><span>⚙️</span> Gestão Espaços</button>
                            </div>
                        )}
                        <div className="mt-auto pt-6 text-[10px] text-cyan-400 font-black uppercase italic cursor-pointer" onClick={() => setEditingUser(user)}>Perfil: {user.name} ⚙️</div>
                        <button onClick={onLogout} className="text-left py-4 font-black text-red-400 text-[10px] uppercase">Sair 🚪</button>
                    </nav>

                    <main id="conteudo-principal" className="flex-1 p-5 md:p-12 overflow-auto">
                        {view === 'spaces' && (
                <div className="space-y-8">
                    <div className="flex flex-col gap-6">
                        <div>
                            <h2 className="text-3xl font-black uppercase italic text-white">Espaços</h2>
                            <p className="text-[10px] font-black text-cyan-400 uppercase tracking-[0.3em]">Selecione o local para sua reserva</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 bg-[#0a3d5c]/30 p-6 rounded-[2.5rem] border border-white/5 shadow-2xl">
                            <div className="flex flex-col gap-1">
                                <label className="text-[9px] font-black uppercase text-slate-500 ml-4">Nome do Espaço</label>
                                <select className="input-field !py-3" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}>
                                    <option value="">Todos os espaços</option>
                                    {[...new Set(spaces.map(s => s.name))].sort().map(name => (
                                        <option key={name} value={name}>{name}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="flex flex-col gap-1">
                                <label className="text-[9px] font-black uppercase text-slate-500 ml-4">Localização</label>
                                <select className="input-field !py-3" value={locFilter} onChange={e => setLocFilter(e.target.value)}>
                                    <option value="">Todos os setores</option>
                                    {[...new Set(spaces.map(s => s.location).filter(Boolean))].sort().map(l => (
                                        <option key={l} value={l}>{l}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="flex flex-col gap-1">
                                <label className="text-[9px] font-black uppercase text-slate-500 ml-4">Capacidade Mínima</label>
                                <input type="number" placeholder="Ex: 50" className="input-field !py-3" value={capFilter} onChange={e => setCapFilter(e.target.value)} />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        {spaces
                            .filter(s => searchTerm ? s.name === searchTerm : true)
                            .filter(s => locFilter ? s.location === locFilter : true)
                            .filter(s => capFilter ? parseInt(s.capacity) >= parseInt(capFilter) : true)
                            .sort((a, b) => a.name.localeCompare(b.name))
                            .map(s => {
                                const next = reservations.filter(r => r.spaceId === s.id && (r.status === 'aprovado' || r.status === 'bloqueio') && !isEventPast(r.date, r.endTime)).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 3);
                                return (
                                    <div key={s.id} className="card-round flex flex-col group hover:border-cyan-500/50 transition-all duration-500">
                                        <div className="relative h-64 overflow-hidden rounded-t-[3rem]">
                                            <div className="absolute top-5 left-5 z-10"><span className="tag-infra !bg-cyan-600/80 backdrop-blur-md">{s.location || 'Geral'}</span></div>
                                            <div className="absolute top-5 right-5 z-10"><span className="tag-cap">Cap.: {s.capacity}</span></div>
                                            <img src={s.imageUrl} className="w-full h-full object-cover brightness-75 group-hover:scale-110 transition-transform duration-700" />
                                            {s.observations && <div className="btn-obs-float" onClick={() => setViewObs(s)}>!</div>}
                                        </div>
                                        <div className="p-8 flex-1 flex flex-col">
                                            <h3 className="text-2xl font-black uppercase mb-4 tracking-tighter">{s.name}</h3>
                                            <div className="flex flex-wrap gap-2 mb-6">{s.infra?.split(',').map((item, idx) => <span key={idx} className="tag-infra">{item.trim()}</span>)}</div>
                                            <div className="mb-8 p-6 bg-[#0a3d5c]/60 rounded-[2rem] border border-cyan-900/30 flex-1">
                                                <p className="text-[10px] font-black text-cyan-400 uppercase mb-4 tracking-widest">Próximas Marcações:</p>
                                                {next.length > 0 ? next.map(nt => (
                                                    <div key={nt.id} className="flex justify-between items-center border-b border-white/5 pb-2 mb-2 last:border-0">
                                                        <div className="flex flex-col"><span className="text-[10px] font-black uppercase">{nt.eventTitle}</span><span className="text-[9px] text-orange-400 font-bold">{fmtDataBR(nt.date)}</span></div>
                                                        <span className="text-[10px] font-bold text-slate-300">{nt.startTime} - {nt.endTime}</span>
                                                    </div>
                                                )) : <p className="text-[10px] italic text-slate-500">Sem eventos agendados.</p>}
                                            </div>
                                            <button disabled={pendingCheckoutBlock || s.inactive} onClick={() => setBookingSpace(s)} className="w-full py-5 btn-primary uppercase text-xs shadow-xl active:scale-95 transition-transform">
                                                {pendingCheckoutBlock ? 'CHECKOUT PENDENTE' : s.inactive ? 'ESPAÇO INATIVO' : 'RESERVAR ESPAÇO'}
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                    </div>
                </div>
            )}
            {view === 'public' && (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <h2 className="text-2xl font-black uppercase italic text-cyan-400">Visão Geral</h2>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-2 w-full md:w-auto">
    <input type="date" value={fDate} onChange={e => setFDate(e.target.value)} className="input-field !py-2 text-[10px]" />
    
    <select value={fSpace} onChange={e => setFSpace(e.target.value)} className="input-field !py-2 text-[10px]">
        <option value="">Todos Locais</option>
        {spaces.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
    </select>
    
    <select value={fPerson} onChange={e => setFPerson(e.target.value)} className="input-field !py-2 text-[10px]">
        <option value="">Todas Pessoas</option>
        {[...new Set(reservations.map(r => r.requesterName))].sort().map(n => <option key={n} value={n}>{n}</option>)}
    </select>
    
    <label className="flex items-center justify-center gap-2 bg-[#0a3d5c] px-2 rounded-xl text-[9px] font-black uppercase cursor-pointer min-h-[38px]">
        <input type="checkbox" checked={hidePast} onChange={e => setHidePast(e.target.checked)} className="custom-check !w-4 !h-4" /> 
        <span className="leading-tight text-center">Ocultar Passados</span>
    </label>

    <label className="flex items-center justify-center gap-2 bg-[#0a3d5c] px-2 rounded-xl text-[9px] font-black uppercase cursor-pointer min-h-[38px]">
        <input type="checkbox" checked={hideInstitutional} onChange={e => setHideInstitutional(e.target.checked)} className="w-4 h-4 cursor-pointer" /> 
        <span className="leading-tight text-center">Ocultar Institucional</span>
    </label>
</div>
                    </div>
                    <div className="grid gap-4">
                        {reservations.filter(r => (r.status === 'aprovado' || r.status === 'bloqueio') && (fDate ? r.date === fDate : true) && (fSpace ? r.spaceId === fSpace : true) && (fPerson ? r.requesterName === fPerson : true) && (hidePast ? (!isEventPast(r.date, r.endTime) || !r.checkoutDone) : true) && (hideInstitutional ? r.status !== 'bloqueio' : true)).sort((a,b) => a.date.localeCompare(b.date)).map(r => (
                            <div key={r.id} className={`card-round p-6 flex flex-col md:flex-row justify-between items-center gap-6 border-l-4 ${r.status === 'bloqueio' ? 'border-slate-500 bg-slate-900/40' : 'border-cyan-400'}`}>
                                <div className="flex-1">
                                    <h4 className="font-black text-lg uppercase text-white tracking-tight">{r.eventTitle}</h4>
                                    
                                    {r.description && <p className="text-[11px] text-slate-400 italic mb-2">"{r.description}"</p>}
                                    
                                    <p className="text-xs font-bold text-slate-300 uppercase">{fmtDataBR(r.date)} | {r.startTime} às {r.endTime} | {r.spaceName}</p>
                                    
                                    <div className="flex gap-4 items-center mt-3">
                                        <p className="text-[10px] font-black text-cyan-400 uppercase">Resp: {r.requesterName}</p>
                                        
                                        {/* CORREÇÃO DAS TAGS DE STATUS */}
                                        {r.status !== 'bloqueio' && (
                                            <span className={`text-[9px] font-black uppercase px-2 py-1 rounded ${
                                                r.checkoutDone 
                                                ? 'bg-green-900/40 text-green-400' 
                                                : (isEventPast(r.date, r.endTime) 
                                                    ? 'bg-orange-600 text-white animate-pulse-fast' 
                                                    : 'bg-blue-900/40 text-blue-400')
                                            }`}>
                                                {r.checkoutDone 
                                                ? '✓ Checkout OK' 
                                                : (isEventPast(r.date, r.endTime) 
                                                    ? '⚠ Checkout Pendente' 
                                                    : 'Agendado')}
                                            </span>
                                        )}
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center flex-wrap justify-end">
                                    {isAdmin && r.status !== 'bloqueio' && (
                                        <button onClick={() => askZap(r.requesterPhone, `Olá ${r.requesterName}, sobre o evento "${r.eventTitle}"...`)} className="btn-zap-circle">💬</button>
                                    )}
                                    
                                    {isAdmin && (
                                        <>
                                            {r.status === 'bloqueio' && r.batchId && (
                                                <button onClick={() => {
                                                    if(confirm('ATENÇÃO: Deseja excluir TODOS os bloqueios desta série (todas as datas)?')) {
                                                        const batch = reservations.filter(item => item.batchId === r.batchId);
                                                        batch.forEach(item => db.ref('reservations/'+item.id).remove());
                                                        alert(`${batch.length} bloqueios removidos!`);
                                                    }
                                                }} className="bg-red-900/50 text-red-400 px-3 py-2 rounded-lg font-black text-[10px] uppercase border border-red-900 hover:bg-red-900 transition-colors">
                                                    Excluir Série
                                                </button>
                                            )}
                                            
                                            <button onClick={() => {if(confirm('Excluir este item individualmente?')) db.ref('reservations/'+r.id).remove()}} className="text-red-500 font-black text-[10px] uppercase underline">
                                                Excluir
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
                        {view === 'my-bookings' && (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                                    <h2 className="text-2xl font-black uppercase italic text-cyan-400">Minhas Reservas</h2>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-2 w-full md:w-auto">
                                        <input type="date" onChange={e => setFDate(e.target.value)} className="input-field !py-2 text-[10px]" />
                                        <select onChange={e => setFSpace(e.target.value)} className="input-field !py-2 text-[10px]"><option value="">Locais</option>{spaces.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select>

                                <label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Informe o Motivo</label>
                                <textarea id="reason" className="input-field h-32"></textarea>
                                <button onClick={() => {
                                    const r = document.getElementById('reason').value; if(!r) return alert("Motivo obrigatório.");
                                    askZap(rejectModal.requesterPhone, `Reserva para ${rejectModal.eventTitle} recusada. Motivo: ${r}`, () => db.ref('reservations/'+rejectModal.id).update({status:'rejeitado', rejectionReason: r}));
                                    setRejectModal(null);
                                }} className="w-full bg-red-600 py-5 rounded-2xl font-black uppercase text-xs text-white">Confirmar Recusa</button>
                            </div>
                        </Modal>
                    )}
            {/* MODAL BLOQUEIO INSTITUCIONAL (COM ID DE SÉRIE PARA EXCLUSÃO EM MASSA) */}
            {blockingSpace && (
                <Modal title="BLOQUEIO INSTITUCIONAL" onClose={() => setBlockingSpace(false)}>
                    <form className="space-y-5" onSubmit={(e) => {
                        e.preventDefault(); const fd = new FormData(e.target);
                        const sp = spaces.find(s => s.id === fd.get('spaceId'));
                        const days = Array.from(fd.getAll('days')).map(Number);
                        
                        // Cria um ID único para este lote de bloqueios (permite exclusão em massa depois)
                        const batchId = Date.now().toString(); 
                        
                        let curr = new Date(); 
                        const endY = new Date(curr.getFullYear(), 11, 31);
                        
                        while(curr <= endY) {
                            if(days.includes(curr.getDay())) {
                                const y = curr.getFullYear();
                                const m = String(curr.getMonth() + 1).padStart(2, '0');
                                const d = String(curr.getDate()).padStart(2, '0');
                                const dataF = `${y}-${m}-${d}`;
                                
                                const nr = db.ref('reservations').push();
                                nr.set({ 
                                    id: nr.key, 
                                    spaceId: sp.id, 
                                    spaceName: sp.name, 
                                    eventTitle: `[FIXO] ${fd.get('title')}`, 
                                    date: dataF, 
                                    startTime: fd.get('start'), 
                                    endTime: fd.get('end'), 
                                    requesterName: "INSTITUCIONAL", 
                                    status: 'bloqueio',
                                    batchId: batchId // Identificador da série
                                });
                            }
                            curr.setDate(curr.getDate()+1);
                        }
                        alert("Bloqueio realizado com sucesso!"); setBlockingSpace(false);
                    }}>
                        <div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Título (Ex: Escola / Culto)</label><input name="title" required className="input-field" /></div>
                        <div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Local</label><select name="spaceId" required className="input-field">{spaces.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                        <div className="flex flex-wrap gap-2 my-4">
                            {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].map((d,i)=>(<label key={i} className="flex items-center gap-1 bg-[#0a3d5c] p-2 rounded-lg text-[10px] font-bold cursor-pointer hover:bg-[#0e4b6e]"><input type="checkbox" name="days" value={i} className="custom-check !w-4 !h-4" /> {d}</label>))}
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Início</label><input name="start" type="time" required className="input-field" /></div>
                            <div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Fim</label><input name="end" type="time" required className="input-field" /></div>
                        </div>
                        <button className="w-full btn-primary py-5 uppercase text-xs mt-4">Confirmar Bloqueio</button>
                    </form>
                </Modal>
                )}
        </div>
    );
};                   
        const Auth = () => {
            const [isLogin, setIsLogin] = useState(true);
            const handleAuth = async (e) => { e.preventDefault(); const fd = new FormData(e.target);
                try { if (isLogin) { await auth.signInWithEmailAndPassword(fd.get('email'), fd.get('pass')); } 
                    else { const uc = await auth.createUserWithEmailAndPassword(fd.get('email'), fd.get('pass'));
                        await db.ref('users/'+uc.user.uid).set({ id: uc.user.uid, name: fd.get('name'), phone: fd.get('phone'), role: 'membro', status: 'pendente' }); 
                        alert("Aguarde aprovação!"); setIsLogin(true); } 
                } catch (err) { alert(err.message); } 
            };
            return ( <div className="min-h-screen flex items-center justify-center bg-[#02111a] p-6"><div className="bg-[#041d2c] border border-[#1e6091] p-10 rounded-[3.5rem] w-full max-w-md text-center"><div className="flex justify-center mb-8">
    <img src="logo.png" alt="MarkinPeace" className="w-48 h-auto object-contain" />
</div><form className="space-y-4 text-left" onSubmit={handleAuth}>{!isLogin && <div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Nome</label><input name="name" required className="input-field" /></div>}{!isLogin && <div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">WhatsApp</label><input name="phone" required className="input-field" /></div>}<div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">E-mail</label><input name="email" type="email" required className="input-field" /></div><div><label className="text-[10px] font-black uppercase text-slate-500 mb-1 block">Senha</label><input name="pass" type="password" required className="input-field" /></div><button type="submit" className="w-full btn-primary py-5 uppercase text-sm mt-4">{isLogin ? 'ENTRAR' : 'SOLICITAR ACESSO'}</button></form><button onClick={() => setIsLogin(!isLogin)} className="mt-8 text-[11px] font-black uppercase text-cyan-400 underline tracking-widest">{isLogin ? 'Solicitar Acesso' : 'Voltar'}</button></div></div> );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            useEffect(() => { return auth.onAuthStateChanged(async (u) => { 
                if (u) { const s = await db.ref('users/'+u.uid).once('value'); const d = s.val(); 
                    if (u.email === "adminmestreibpaz@igreja.com" || (d && d.status === 'aprovado')) setUser({ id: u.uid, ...d, email: u.email }); 
                    else { alert("Aguarde aprovação."); auth.signOut(); } 
                } else setUser(null); setLoading(false); }); 
            }, []);
            if (loading) return (
    <div className="h-screen bg-[#02111a] flex flex-col items-center justify-center gap-6">
        <img 
            src="logo.png" 
            alt="Loading..." 
            className="w-48 h-auto animate-pulse" 
        />
        <div className="w-32 h-1 bg-white/5 rounded-full overflow-hidden">
            <div className="h-full bg-cyan-400 animate-[loading_1.5s_ease-in-out_infinite]"></div>
        </div>
        <style>{`
            @keyframes loading {
                0% { width: 0%; transform: translateX(-100%); }
                50% { width: 100%; transform: translateX(0%); }
                100% { width: 0%; transform: translateX(100%); }
            }
        `}</style>
    </div>
);
            return user ? <Dashboard user={user} onLogout={() => auth.signOut()} /> : <Auth />;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
